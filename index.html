<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ひらがな">
<meta name="theme-color" content="#fff8e7">
<link rel="manifest" href="manifest.json">
<title>ひらがな クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fff8e7;
    --peach: #ffd5b8;
    --pink: #ffb3c6;
    --mint: #b8e6d4;
    --sky: #b8dcff;
    --lemon: #fff2a8;
    --lavender: #e0c8ff;
    --coral: #ff7a6b;
    --grape: #9c7bd9;
    --ink: #3d2b56;
    --shadow: 0 6px 0 rgba(61, 43, 86, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Yusei Magic', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 15% 20%, var(--lemon) 0%, transparent 35%),
      radial-gradient(circle at 85% 75%, var(--mint) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, var(--pink) 0%, transparent 45%),
      var(--cream);
    user-select: none;
    -webkit-user-select: none;
  }

  .cloud {
    position: fixed;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%;
  }
  .c1 { width: 80px; height: 80px; top: 8%; left: -100px; animation: drift 40s linear infinite; }
  .c1::before { width: 60px; height: 60px; top: -25px; left: 15px; }
  .c1::after { width: 50px; height: 50px; top: 10px; left: 50px; }
  .c2 { width: 100px; height: 100px; top: 70%; left: -150px; animation: drift 55s linear infinite; animation-delay: -20s; }
  .c2::before { width: 70px; height: 70px; top: -30px; left: 20px; }
  .c2::after { width: 60px; height: 60px; top: 15px; left: 65px; }

  @keyframes drift {
    from { transform: translateX(0); }
    to { transform: translateX(calc(100vw + 250px)); }
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 14px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
    max-width: 760px;
    margin: 0 auto;
  }

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 10px;
  }

  .score {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 999px;
    padding: 8px 18px;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .star-icon { font-size: 22px; }

  .review-badge {
    background: var(--grape);
    color: white;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 14px;
    margin-left: 8px;
    display: none;
  }
  .review-badge.show { display: inline-block; }

  .restart {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 999px;
    width: 48px;
    height: 48px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .restart:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(61,43,86,0.15); }

  .question-card {
    background: white;
    border: 5px solid var(--ink);
    border-radius: 28px;
    padding: 18px 16px;
    text-align: center;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .question-card.review-mode {
    background: linear-gradient(135deg, white 0%, #f3eaff 100%);
    border-color: var(--grape);
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 80px; height: 80px;
    background: var(--lemon);
    border-radius: 50%;
    opacity: 0.6;
  }
  .question-card::after {
    content: '';
    position: absolute;
    bottom: -25px; left: -25px;
    width: 60px; height: 60px;
    background: var(--pink);
    border-radius: 50%;
    opacity: 0.5;
  }

  .review-tag {
    position: absolute;
    top: 10px;
    left: 16px;
    background: var(--grape);
    color: white;
    border-radius: 999px;
    padding: 4px 12px;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 14px;
    display: none;
    z-index: 2;
  }
  .review-tag.show { display: block; }

  .hint-emoji {
    font-size: clamp(64px, 11vmin, 120px);
    line-height: 1;
    display: inline-block;
    animation: bounce 1.5s ease-in-out infinite;
    position: relative;
    margin: 8px 0;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }

  .speaker-btn {
    background: var(--coral);
    border: 4px solid var(--ink);
    border-radius: 999px;
    color: white;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 18px;
    padding: 10px 22px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    position: relative;
    margin-top: 6px;
  }
  .speaker-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(61,43,86,0.15); }

  .choices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    flex: 1;
    align-content: center;
    min-height: 0;
  }

  .choice {
    background: white;
    border: 5px solid var(--ink);
    border-radius: 24px;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: clamp(40px, 9vmin, 84px);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.1s, background 0.2s;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    position: relative;
    overflow: hidden;
  }

  .choice:nth-child(6n+1) { background: var(--peach); }
  .choice:nth-child(6n+2) { background: var(--mint); }
  .choice:nth-child(6n+3) { background: var(--sky); }
  .choice:nth-child(6n+4) { background: var(--lemon); }
  .choice:nth-child(6n+5) { background: var(--lavender); }
  .choice:nth-child(6n+6) { background: var(--pink); }

  .choice:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(61,43,86,0.15); }

  .choice.correct {
    animation: correct-pulse 0.6s ease;
    background: #7dd87d !important;
  }
  .choice.wrong {
    animation: shake 0.4s ease;
    background: #ff9999 !important;
  }

  @keyframes correct-pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15) rotate(5deg); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .celebrate {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    display: none;
  }
  .celebrate.show { display: block; }

  .confetti {
    position: absolute;
    width: 14px; height: 14px;
    top: -20px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  .praise {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    border: 5px solid var(--ink);
    border-radius: 32px;
    padding: 20px 44px;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 44px;
    color: var(--coral);
    box-shadow: var(--shadow);
    z-index: 101;
    text-align: center;
    pointer-events: none;
    white-space: nowrap;
  }
  .praise.show {
    animation: pop 1.4s ease forwards;
  }

  @keyframes pop {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); }
    20% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); }
    35% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.1) rotate(0deg); opacity: 0; }
  }

  .streak {
    display: inline-flex;
    gap: 4px;
    margin-left: 10px;
  }
  .streak-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #ddd;
    border: 2px solid var(--ink);
  }
  .streak-dot.on { background: var(--coral); }

  /* 横向き(landscape): 質問カードと選択肢を横並びにして縦の圧迫を防ぐ */
  @media (orientation: landscape) and (max-height: 600px) {
    .app {
      flex-direction: row;
      max-width: 100%;
      gap: 12px;
      align-items: stretch;
    }
    .top {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 10;
    }
    .question-card {
      flex: 0 0 38%;
      margin-bottom: 0;
      margin-top: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .choices {
      margin-top: 70px;
    }
  }

  /* 大画面(iPad横向きなど) */
  @media (min-width: 768px) {
    .app { padding: 24px; max-width: 900px; }
    .question-card { padding: 24px; border-radius: 36px; }
    .choices { gap: 16px; }
    .choice { border-radius: 28px; }
  }

  /* 小さい画面 */
  @media (max-width: 380px) {
    .choice { border-radius: 18px; border-width: 4px; }
    .score { font-size: 16px; padding: 6px 12px; }
    .star-icon { font-size: 18px; }
    .streak-dot { width: 10px; height: 10px; }
  }

  /* 低い画面(横向きスマホなど) */
  @media (max-height: 500px) {
    .question-card { padding: 8px; }
    .speaker-btn { font-size: 14px; padding: 6px 14px; }
  }

  /* ===== 成長レポート画面 ===== */
  .stats-btn {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 999px;
    width: 48px;
    height: 48px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .stats-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(61,43,86,0.15); }

  .stats-screen {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    display: none;
  }
  .stats-screen.show { display: block; }

  .stats-inner {
    max-width: 760px;
    margin: 0 auto;
  }

  .stats-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }

  .stats-title {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 24px;
    color: var(--ink);
  }

  .stats-close {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 999px;
    width: 48px;
    height: 48px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .stats-close:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(61,43,86,0.15); }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .summary-card {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 20px;
    padding: 14px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .summary-card.wide { grid-column: 1 / -1; }

  .summary-label {
    font-size: 14px;
    color: var(--ink);
    opacity: 0.7;
    margin-bottom: 6px;
  }

  .summary-value {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 28px;
    color: var(--coral);
  }

  .progress-bar {
    background: #f0e6d8;
    border: 3px solid var(--ink);
    border-radius: 999px;
    height: 24px;
    overflow: hidden;
    margin-top: 8px;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mint), var(--coral));
    transition: width 0.4s ease;
  }
  .progress-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 14px;
    color: var(--ink);
  }

  .section {
    background: white;
    border: 4px solid var(--ink);
    border-radius: 20px;
    padding: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .gojuon-table {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
  }

  .kana-cell {
    aspect-ratio: 1;
    border: 2px solid var(--ink);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: clamp(14px, 3.5vmin, 22px);
    color: var(--ink);
    background: #f0f0f0;
    position: relative;
  }
  /* 習熟度: 灰=未学習、黄=学習中、緑=習得 */
  .kana-cell.unseen { background: #ececec; opacity: 0.5; }
  .kana-cell.learning-low { background: #ffe5b8; }
  .kana-cell.learning-mid { background: #fff2a8; }
  .kana-cell.learning-high { background: #c8e8a8; }
  .kana-cell.mastered { background: #7dd87d; color: white; border-color: var(--ink); }
  .kana-cell.empty { background: transparent; border: none; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
    font-size: 12px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .legend-swatch {
    width: 16px; height: 16px;
    border: 2px solid var(--ink);
    border-radius: 4px;
  }

  .weak-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .weak-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: #fff5f0;
    border: 3px solid var(--ink);
    border-radius: 14px;
  }
  .weak-kana {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 32px;
    color: var(--coral);
    width: 48px;
    text-align: center;
  }
  .weak-info {
    flex: 1;
    font-size: 14px;
  }
  .weak-rate {
    font-family: 'Mochiy Pop One', sans-serif;
    font-size: 18px;
    color: var(--ink);
  }

  .daily-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 100px;
    padding: 0 4px;
  }
  .daily-bar {
    flex: 1;
    background: var(--mint);
    border: 2px solid var(--ink);
    border-radius: 6px 6px 0 0;
    min-height: 4px;
    position: relative;
    transition: height 0.4s ease;
  }
  .daily-bar.today { background: var(--coral); }
  .daily-labels {
    display: flex;
    gap: 4px;
    padding: 4px;
    font-size: 10px;
    color: var(--ink);
    opacity: 0.7;
    margin-top: 4px;
  }
  .daily-labels span { flex: 1; text-align: center; }

  .empty-msg {
    text-align: center;
    padding: 20px;
    color: var(--ink);
    opacity: 0.6;
    font-size: 14px;
  }

  .reset-stats {
    display: block;
    margin: 20px auto 0;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 999px;
    padding: 8px 18px;
    font-family: 'Yusei Magic', sans-serif;
    font-size: 13px;
    color: var(--ink);
    opacity: 0.7;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>

<div class="app">
  <div class="top">
    <div class="score">
      <span class="star-icon">⭐</span>
      <span id="scoreNum">0</span>
      <div class="streak" id="streak">
        <div class="streak-dot"></div>
        <div class="streak-dot"></div>
        <div class="streak-dot"></div>
      </div>
      <span class="review-badge" id="reviewBadge">📖 <span id="reviewCount">0</span></span>
    </div>
    <div style="display: flex; gap: 8px;">
      <button class="stats-btn" id="statsBtn" aria-label="きろくをみる">📊</button>
      <button class="restart" id="restartBtn" aria-label="さいしょから">🔄</button>
    </div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="review-tag" id="reviewTag">📖 ふくしゅう</div>
    <div class="hint-emoji" id="hintEmoji">🍎</div>
    <div>
      <button class="speaker-btn" id="speakBtn">
        <span style="font-size: 22px;">🔊</span>
        <span>もういちど きく</span>
      </button>
    </div>
  </div>

  <div class="choices" id="choices"></div>
</div>

<div class="praise" id="praise">すごい！</div>
<div class="celebrate" id="celebrate"></div>

<!-- 成長レポート画面 -->
<div class="stats-screen" id="statsScreen">
  <div class="stats-inner">
    <div class="stats-header">
      <div class="stats-title">📊 おべんきょうの きろく</div>
      <button class="stats-close" id="statsCloseBtn" aria-label="とじる">✕</button>
    </div>

    <div class="summary-grid" id="summaryGrid"></div>

    <div class="section">
      <div class="section-title">🗾 50おん ひょう</div>
      <div class="gojuon-table" id="gojuonTable"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#ececec"></div>まだ</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#ffe5b8"></div>むずかしい</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#fff2a8"></div>もうすこし</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#c8e8a8"></div>じょうず</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#7dd87d"></div>たっせい！</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🌱 にがてな もじ</div>
      <div id="weakList"></div>
    </div>

    <div class="section">
      <div class="section-title">📅 さいきんの がんばり</div>
      <div id="dailyChartArea"></div>
    </div>

    <button class="reset-stats" id="resetStatsBtn">きろくを ぜんぶ けす</button>
  </div>
</div>

<script>
  // Hiragana data with words for full readout
  const KANA = [
    { c: 'あ', e: '🐜', w: 'あり' },
    { c: 'い', e: '🐕', w: 'いぬ' },
    { c: 'う', e: '🐂', w: 'うし' },
    { c: 'え', e: '✏️', w: 'えんぴつ' },
    { c: 'お', e: '🍙', w: 'おにぎり' },
    { c: 'か', e: '🦀', w: 'かに' },
    { c: 'き', e: '🦒', w: 'きりん' },
    { c: 'く', e: '🐻', w: 'くま' },
    { c: 'け', e: '🧶', w: 'けいと' },
    { c: 'こ', e: '🎏', w: 'こいのぼり' },
    { c: 'さ', e: '🐟', w: 'さかな' },
    { c: 'し', e: '🦓', w: 'しまうま' },
    { c: 'す', e: '🍉', w: 'すいか' },
    { c: 'せ', e: '🐛', w: 'せみ' },
    { c: 'そ', e: '☁️', w: 'そら' },
    { c: 'た', e: '🐙', w: 'たこ' },
    { c: 'ち', e: '🌍', w: 'ちきゅう' },
    { c: 'つ', e: '🌙', w: 'つき' },
    { c: 'て', e: '✋', w: 'て' },
    { c: 'と', e: '🐯', w: 'とら' },
    { c: 'な', e: '🍆', w: 'なす' },
    { c: 'に', e: '🌈', w: 'にじ' },
    { c: 'ぬ', e: '🧸', w: 'ぬいぐるみ' },
    { c: 'ね', e: '🐈', w: 'ねこ' },
    { c: 'の', e: '🌿', w: 'のはら' },
    { c: 'は', e: '🌸', w: 'はな' },
    { c: 'ひ', e: '🔥', w: 'ひ' },
    { c: 'ふ', e: '🎈', w: 'ふうせん' },
    { c: 'へ', e: '🐍', w: 'へび' },
    { c: 'ほ', e: '⭐', w: 'ほし' },
    { c: 'ま', e: '🎯', w: 'まと' },
    { c: 'み', e: '🍊', w: 'みかん' },
    { c: 'む', e: '🐞', w: 'むし' },
    { c: 'め', e: '👁️', w: 'め' },
    { c: 'も', e: '🍑', w: 'もも' },
    { c: 'や', e: '⛰️', w: 'やま' },
    { c: 'ゆ', e: '☃️', w: 'ゆきだるま' },
    { c: 'よ', e: '⛵', w: 'よっと' },
    { c: 'ら', e: '🦁', w: 'らいおん' },
    { c: 'り', e: '🍎', w: 'りんご' },
    { c: 'る', e: '💎', w: 'るびー' },
    { c: 'れ', e: '🍋', w: 'れもん' },
    { c: 'ろ', e: '🕯️', w: 'ろうそく' },
    { c: 'わ', e: '🐊', w: 'わに' },
    { c: 'を', e: '📖', w: 'ほんを よむ' },
    { c: 'ん', e: '🍞', w: 'ぱん' }
  ];

  const CONFUSION_GROUPS = [
    ['さ', 'ち', 'き'],
    ['ぬ', 'め', 'の', 'あ'],
    ['は', 'ほ', 'ま'],
    ['ね', 'れ', 'わ'],
    ['る', 'ろ'],
    ['い', 'り'],
    ['こ', 'に'],
    ['し', 'つ'],
    ['た', 'な'],
    ['ら', 'う', 'ろ'],
    ['ふ', 'う'],
    ['そ', 'ろ'],
    ['ん', 'く'],
    ['け', 'は'],
    ['て', 'と'],
    ['ま', 'も']
  ];

  // Spaced Repetition state
  // mistakes: { kana: { wrongCount, correctSinceWrong, dueIn } }
  // dueIn = number of questions until this kana should be re-asked
  const STORAGE_KEY = 'hiragana_quiz_mistakes_v1';
  const ROUND_KEY = 'hiragana_quiz_round_v1';
  const STATS_KEY = 'hiragana_quiz_stats_v1';
  let mistakes = {};
  let questionCount = 0;
  let lastTargetKana = null;
  // roundQueue: array of kana characters remaining in this round
  let roundQueue = [];

  // 学習統計データ
  // perKana: { 'あ': { attempts: N, correct: N }, ... }
  // daily: { 'YYYY-MM-DD': { attempts: N, correct: N } }
  // firstPlayDate: 初回プレイ日 (YYYY-MM-DD)
  // lastPlayDate: 最後のプレイ日
  let stats = {
    perKana: {},
    daily: {},
    firstPlayDate: null,
    lastPlayDate: null,
    totalAttempts: 0,
    totalCorrect: 0
  };

  function loadStats() {
    try {
      const raw = localStorage.getItem(STATS_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        stats = Object.assign(stats, parsed);
      }
    } catch (e) {}
  }
  function saveStats() {
    try {
      localStorage.setItem(STATS_KEY, JSON.stringify(stats));
    } catch (e) {}
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function recordAttempt(kana, isCorrect) {
    const today = todayStr();
    if (!stats.firstPlayDate) stats.firstPlayDate = today;
    stats.lastPlayDate = today;

    if (!stats.perKana[kana]) stats.perKana[kana] = { attempts: 0, correct: 0 };
    stats.perKana[kana].attempts += 1;
    if (isCorrect) stats.perKana[kana].correct += 1;

    if (!stats.daily[today]) stats.daily[today] = { attempts: 0, correct: 0 };
    stats.daily[today].attempts += 1;
    if (isCorrect) stats.daily[today].correct += 1;

    stats.totalAttempts += 1;
    if (isCorrect) stats.totalCorrect += 1;

    saveStats();
  }

  // 頻度順(島村・三神 1994 等の幼児ひらがな獲得研究を参考に、
  // 子どもの語彙でよく出会う文字を先に置いた順序)
  // 同じ習得段階内では紛らわしい文字が連続しないよう配慮。
  const FREQUENCY_ORDER = [
    // 第1グループ: 自分の名前・身近な語に頻出
    'あ', 'い', 'う', 'え', 'お',
    'か', 'き', 'く', 'け', 'こ',
    'さ', 'し', 'す', 'せ', 'そ',
    'た', 'ち', 'つ', 'て', 'と',
    'な', 'に', 'ぬ', 'ね', 'の',
    'は', 'ひ', 'ふ', 'へ', 'ほ',
    'ま', 'み', 'む', 'め', 'も',
    'や', 'ゆ', 'よ',
    'ら', 'り', 'る', 'れ', 'ろ',
    'わ', 'を', 'ん'
  ];

  function loadMistakes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) mistakes = JSON.parse(raw);
    } catch (e) { mistakes = {}; }
  }
  function saveMistakes() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(mistakes));
    } catch (e) {}
  }

  function loadRound() {
    try {
      const raw = localStorage.getItem(ROUND_KEY);
      if (raw) {
        const arr = JSON.parse(raw);
        if (Array.isArray(arr)) roundQueue = arr;
      }
    } catch (e) { roundQueue = []; }
  }
  function saveRound() {
    try {
      localStorage.setItem(ROUND_KEY, JSON.stringify(roundQueue));
    } catch (e) {}
  }

  // Build a fresh round: all 46 kana in frequency order,
  // lightly shuffled within small windows so that confusable
  // pairs don't always appear back-to-back, but the overall
  // frequency progression is preserved.
  function buildNewRound() {
    const ordered = FREQUENCY_ORDER.slice();
    // Shuffle within sliding windows of 5 to add variety
    const windowSize = 5;
    for (let i = 0; i < ordered.length; i += windowSize) {
      const window = ordered.slice(i, i + windowSize);
      for (let j = window.length - 1; j > 0; j--) {
        const k = Math.floor(Math.random() * (j + 1));
        [window[j], window[k]] = [window[k], window[j]];
      }
      for (let j = 0; j < window.length; j++) {
        ordered[i + j] = window[j];
      }
    }
    return ordered;
  }

  function recordWrong(kana) {
    if (!mistakes[kana]) {
      mistakes[kana] = { wrongCount: 0, correctSinceWrong: 0, dueIn: 0 };
    }
    mistakes[kana].wrongCount += 1;
    mistakes[kana].correctSinceWrong = 0;
    // Re-ask soon: 2-3 questions later
    mistakes[kana].dueIn = 2 + Math.floor(Math.random() * 2);
    saveMistakes();
  }

  function recordCorrect(kana) {
    if (!mistakes[kana]) return;
    mistakes[kana].correctSinceWrong += 1;
    // Spaced intervals: 2, 5, 10 questions, then graduate
    const correctCount = mistakes[kana].correctSinceWrong;
    if (correctCount === 1) mistakes[kana].dueIn = 5;
    else if (correctCount === 2) mistakes[kana].dueIn = 10;
    else if (correctCount >= 3) {
      // Graduated! Remove from review queue
      delete mistakes[kana];
    }
    saveMistakes();
  }

  function tickDueCounters() {
    // After each question advances, decrement all dueIn counters
    Object.keys(mistakes).forEach(k => {
      if (mistakes[k].dueIn > 0) mistakes[k].dueIn -= 1;
    });
  }

  function getDueKana() {
    return Object.keys(mistakes).filter(k => mistakes[k].dueIn <= 0);
  }

  function pickNextKana() {
    const due = getDueKana();
    let target;

    // 復習対象がある場合は40%の確率で割り込み出題
    // (まんべんなさを優先するためメイン進行は維持)
    if (due.length > 0 && Math.random() < 0.4) {
      const candidates = due.filter(k => k !== lastTargetKana);
      const pool = candidates.length > 0 ? candidates : due;
      const c = pool[Math.floor(Math.random() * pool.length)];
      target = KANA.find(k => k.c === c);
      target._isReview = true;
      return target;
    }

    // ラウンドキューから次の文字を取得
    // キューが空 or 残り1個で前回と同じ場合は新ラウンド開始
    if (roundQueue.length === 0) {
      roundQueue = buildNewRound();
    }
    if (roundQueue.length === 1 && roundQueue[0] === lastTargetKana) {
      // 同じ文字を連続で出さないため、新ラウンドを生成して先頭から取り出す
      const remaining = roundQueue[0];
      roundQueue = buildNewRound();
      // remaining(=前回と同じ)はキュー後方に回す
      const idx = roundQueue.indexOf(remaining);
      if (idx >= 0) {
        roundQueue.splice(idx, 1);
        roundQueue.push(remaining);
      }
    }

    // 先頭が前回と同じなら一つ後ろの候補と入れ替える
    if (roundQueue[0] === lastTargetKana && roundQueue.length > 1) {
      [roundQueue[0], roundQueue[1]] = [roundQueue[1], roundQueue[0]];
    }

    const c = roundQueue.shift();
    saveRound();
    target = KANA.find(k => k.c === c);
    target._isReview = false;
    return target;
  }

  function updateReviewBadge() {
    const count = Object.keys(mistakes).length;
    const badge = document.getElementById('reviewBadge');
    document.getElementById('reviewCount').textContent = count;
    badge.classList.toggle('show', count > 0);
  }

  // ----- DOM & speech -----
  let score = 0;
  let streak = 0;
  let currentTarget = null;
  let canTap = true;

  const scoreNum = document.getElementById('scoreNum');
  const streakEl = document.getElementById('streak');
  const hintEmoji = document.getElementById('hintEmoji');
  const choicesEl = document.getElementById('choices');
  const speakBtn = document.getElementById('speakBtn');
  const restartBtn = document.getElementById('restartBtn');
  const praise = document.getElementById('praise');
  const celebrate = document.getElementById('celebrate');
  const questionCard = document.getElementById('questionCard');
  const reviewTag = document.getElementById('reviewTag');

  // Cache best Japanese voice
  let jaVoice = null;
  function pickVoice() {
    const voices = speechSynthesis.getVoices();
    // Prefer Kyoko, Otoya, or any ja-JP
    jaVoice = voices.find(v => /Kyoko/i.test(v.name)) ||
              voices.find(v => /Otoya/i.test(v.name)) ||
              voices.find(v => v.lang === 'ja-JP') ||
              voices.find(v => v.lang && v.lang.startsWith('ja')) ||
              null;
  }
  if ('speechSynthesis' in window) {
    pickVoice();
    speechSynthesis.onvoiceschanged = pickVoice;
  }

  function speakUtterance(text, opts = {}) {
    if (!('speechSynthesis' in window)) return null;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = opts.rate ?? 0.85;
    u.pitch = opts.pitch ?? 1.3;
    if (jaVoice) u.voice = jaVoice;
    return u;
  }

  // Speak the question: "ありの、あ"
  function speakQuestion(kana) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = speakUtterance(`${kana.w}の、${kana.c}`, { rate: 0.85 });
    if (u) speechSynthesis.speak(u);
  }

  function speakSimple(text, rate) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = speakUtterance(text, { rate: rate ?? 0.85 });
    if (u) speechSynthesis.speak(u);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function pickDistractors(target, n) {
    const tricky = new Set();
    CONFUSION_GROUPS.forEach(g => {
      if (g.includes(target.c)) {
        g.forEach(k => { if (k !== target.c) tricky.add(k); });
      }
    });
    const trickyKana = KANA.filter(k => tricky.has(k.c));
    const otherKana = KANA.filter(k => !tricky.has(k.c) && k.c !== target.c);
    shuffle(trickyKana);
    shuffle(otherKana);
    const trickyTake = Math.min(trickyKana.length, Math.max(2, Math.floor(n * 0.6)));
    const result = trickyKana.slice(0, trickyTake);
    while (result.length < n) {
      result.push(otherKana.pop());
    }
    return result;
  }

  function newQuestion() {
    canTap = true;
    currentTarget = pickNextKana();
    lastTargetKana = currentTarget.c;
    questionCount += 1;

    hintEmoji.textContent = currentTarget.e;

    // Show review styling if from review queue
    if (currentTarget._isReview) {
      questionCard.classList.add('review-mode');
      reviewTag.classList.add('show');
    } else {
      questionCard.classList.remove('review-mode');
      reviewTag.classList.remove('show');
    }

    const distractors = pickDistractors(currentTarget, 5);
    const all = shuffle([currentTarget, ...distractors]);

    choicesEl.innerHTML = '';
    all.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = k.c;
      btn.dataset.kana = k.c;
      btn.addEventListener('click', () => handleChoice(btn, k));
      choicesEl.appendChild(btn);
    });

    setTimeout(() => speakQuestion(currentTarget), 250);
    updateReviewBadge();
  }

  function handleChoice(btn, kana) {
    if (!canTap) return;

    if (kana.c === currentTarget.c) {
      canTap = false;
      btn.classList.add('correct');
      score += 1;
      streak += 1;
      scoreNum.textContent = score;
      updateStreak();
      recordCorrect(currentTarget.c);
      recordAttempt(currentTarget.c, true);
      tickDueCounters();
      // Speak the tapped (correct) kana, then praise
      speechSynthesis.cancel();
      const uKana = speakUtterance(kana.c, { rate: 0.8 });
      const uPraise = speakUtterance('せいかい！', { rate: 0.9 });
      if (uKana) speechSynthesis.speak(uKana);
      if (uPraise) speechSynthesis.speak(uPraise);
      showPraise();

      if (streak >= 3) {
        bigCelebrate();
        streak = 0;
        updateStreak();
      }

      setTimeout(newQuestion, 1500);
    } else {
      btn.classList.add('wrong');
      streak = 0;
      updateStreak();
      recordWrong(currentTarget.c);
      recordAttempt(currentTarget.c, false);
      // Speak the tapped (wrong) kana first, then teach the correct answer
      speechSynthesis.cancel();
      const uTapped = speakUtterance(kana.c, { rate: 0.8 });
      const uPause = speakUtterance('、、', { rate: 0.6 });
      const uAnswer = speakUtterance(`${currentTarget.w}の、${currentTarget.c}`, { rate: 0.8 });
      if (uTapped) speechSynthesis.speak(uTapped);
      if (uPause) speechSynthesis.speak(uPause);
      if (uAnswer) speechSynthesis.speak(uAnswer);
      setTimeout(() => btn.classList.remove('wrong'), 500);
      updateReviewBadge();
    }
  }

  function updateStreak() {
    streakEl.querySelectorAll('.streak-dot').forEach((d, i) => {
      d.classList.toggle('on', i < streak);
    });
  }

  const PRAISES = ['すごい！', 'やったー！', 'せいかい！', 'てんさい！', 'はなまる！'];
  function showPraise() {
    praise.textContent = PRAISES[Math.floor(Math.random() * PRAISES.length)];
    praise.classList.remove('show');
    void praise.offsetWidth;
    praise.classList.add('show');
  }

  function bigCelebrate() {
    celebrate.innerHTML = '';
    const colors = ['#ff7a6b', '#ffd166', '#06d6a0', '#118ab2', '#9c7bd9', '#ffb3c6'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      c.style.animationDelay = Math.random() * 0.3 + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      celebrate.appendChild(c);
    }
    celebrate.classList.add('show');
    setTimeout(() => celebrate.classList.remove('show'), 3000);
  }

  speakBtn.addEventListener('click', () => speakQuestion(currentTarget));
  restartBtn.addEventListener('click', () => {
    if (!confirm('さいしょから はじめますか？\n（てんすう だけ リセットされます。にがてな もじは のこります）')) return;
    score = 0;
    streak = 0;
    scoreNum.textContent = 0;
    updateStreak();
    newQuestion();
  });

  // ===== 成長レポート =====
  const statsBtn = document.getElementById('statsBtn');
  const statsScreen = document.getElementById('statsScreen');
  const statsCloseBtn = document.getElementById('statsCloseBtn');
  const resetStatsBtn = document.getElementById('resetStatsBtn');

  // 50音表配置 (10列 × 5行) — 空セルはnull
  const GOJUON_GRID = [
    ['あ', 'か', 'さ', 'た', 'な', 'は', 'ま', 'や', 'ら', 'わ'],
    ['い', 'き', 'し', 'ち', 'に', 'ひ', 'み', null, 'り', null],
    ['う', 'く', 'す', 'つ', 'ぬ', 'ふ', 'む', 'ゆ', 'る', null],
    ['え', 'け', 'せ', 'て', 'ね', 'へ', 'め', null, 'れ', null],
    ['お', 'こ', 'そ', 'と', 'の', 'ほ', 'も', 'よ', 'ろ', 'を']
  ];
  // ん は最終列に1つだけ — 表外として最後に追加表示
  // (50音表の伝統的配置に従い、わ・を・ん は別扱い)

  function getMasteryClass(kana) {
    const data = stats.perKana[kana];
    if (!data || data.attempts === 0) return 'unseen';
    const rate = data.correct / data.attempts;
    if (data.attempts < 3) return 'learning-low';
    if (rate < 0.5) return 'learning-low';
    if (rate < 0.7) return 'learning-mid';
    if (rate < 0.9 || data.attempts < 5) return 'learning-high';
    return 'mastered';
  }

  function renderGojuon() {
    const tbl = document.getElementById('gojuonTable');

    // 5行 × 10列 を行ごとに描画

    const nCell = document.createElement('div');

  function renderSummary() {
    const grid = document.getElementById('summaryGrid');
    const masteredCount = KANA.filter(k => getMasteryClass(k.c) === 'mastered').length;
    const totalKana = KANA.length;
    const accuracy = stats.totalAttempts > 0
      ? Math.round((stats.totalCorrect / stats.totalAttempts) * 100)
      : 0;
    const studyDays = Object.keys(stats.daily).length;
    const masteredPct = Math.round((masteredCount / totalKana) * 100);

    grid.innerHTML = `

      </div>
      <div class="summary-card">
        <div class="summary-label">せいかいりつ</div>
        <div class="summary-value">${accuracy}%</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">あそんだ ひ</div>
        <div class="summary-value">${studyDays} にち</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">ふくしゅうちゅう</div>

  function renderWeakList() {
    const container = document.getElementById('weakList');
    // 5回以上挑戦した文字のうち、正解率が低いTOP3
    const candidates = Object.keys(stats.perKana)
      .filter(k => stats.perKana[k].attempts >= 3)
      .map(k => ({
        kana: k,
        attempts: stats.perKana[k].attempts,
        correct: stats.perKana[k].correct,
        rate: stats.perKana[k].correct / stats.perKana[k].attempts
      }))
      .filter(x => x.rate < 0.9)
      .sort((a, b) => a.rate - b.rate)
      .slice(0, 3);

    if (candidates.length === 0) {
      container.innerHTML = '<div class="empty-msg">いまのところ にがてな もじは ないよ！すごい！</div>';
      return;
    }

    container.innerHTML = '<div class="weak-list">' +
      candidates.map(x => {
        const k = KANA.find(kk => kk.c === x.kana);
        const pct = Math.round(x.rate * 100);
        return `
          <div class="weak-item">
            <div class="weak-kana">${x.kana}</div>
            <div class="weak-info">
              ${k ? k.e + ' ' + k.w : ''}<br>
              ${x.correct} / ${x.attempts} かい せいかい
            </div>
            <div class="weak-rate">${pct}%</div>
          </div>
        `;
      }).join('') + '</div>';
  }

  function renderDailyChart() {
    const container = document.getElementById('dailyChartArea');
    // 直近14日分を表示
    const days = 14;
    const today = new Date();
    const buckets = [];
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const key = `${y}-${m}-${day}`;
      const entry = stats.daily[key] || { attempts: 0, correct: 0 };
      buckets.push({
        key,
        label: `${parseInt(m)}/${parseInt(day)}`,
        attempts: entry.attempts,
        correct: entry.correct,
        isToday: i === 0
      });
    }

    const maxVal = Math.max(1, ...buckets.map(b => b.attempts));

    if (buckets.every(b => b.attempts === 0)) {
      container.innerHTML = '<div class="empty-msg">まだ きろくが ないよ。あそんでみよう！</div>';
      return;
    }

    const bars = buckets.map(b => {
      const heightPct = (b.attempts / maxVal) * 100;
      const cls = b.isToday ? 'daily-bar today' : 'daily-bar';
      const title = `${b.label}: ${b.correct}/${b.attempts}`;
      return `<div class="${cls}" style="height: ${heightPct}%" title="${title}"></div>`;
    }).join('');

    // ラベルは奇数番目だけ表示して間引く
    const labels = buckets.map((b, i) =>
      `<span>${i % 3 === 0 || b.isToday ? b.label : ''}</span>`
    ).join('');

    container.innerHTML = `
      <div class="daily-chart">${bars}</div>
      <div class="daily-labels">${labels}</div>
    `;
  }

  function showStats() {
    renderSummary();
    renderGojuon();
    renderWeakList();
    renderDailyChart();
    statsScreen.classList.add('show');
  }

  function hideStats() {
    statsScreen.classList.remove('show');
  }

  statsBtn.addEventListener('click', showStats);
  statsCloseBtn.addEventListener('click', hideStats);
  resetStatsBtn.addEventListener('click', () => {
    if (!confirm('きろくを ぜんぶ けしますか？\n(おうちの ひとが かくにん してください)')) return;
    stats = {
      perKana: {},
      daily: {},
      firstPlayDate: null,
      lastPlayDate: null,
      totalAttempts: 0,
      totalCorrect: 0
    };
    saveStats();
    showStats();
  });

  document.addEventListener('dblclick', e => e.preventDefault());

  document.addEventListener('touchstart', function init() {
    speakSimple('');
    document.removeEventListener('touchstart', init);
  }, { once: true });

  // Init
  loadMistakes();
  loadRound();
  loadStats();
  updateReviewBadge();
  newQuestion();

  // Service Worker 登録 (オフライン対応)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {
        // 登録失敗してもアプリは動作するので無視
      });
    });
  }
</script>

</body>
</html>
